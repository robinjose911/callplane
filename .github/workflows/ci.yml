name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-unit:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx turbo build
      - run: npx turbo lint
      - run: npx turbo test

  e2e:
    name: Playwright e2e (stub stack)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: callplane
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx turbo build

      - name: Start local LiveKit dev server
        run: |
          docker run -d --name livekit-dev \
            -p 7880:7880 -p 7881:7881 -p 50000-50100:50000-50100/udp \
            livekit/livekit-server --dev --bind 0.0.0.0
          for i in $(seq 1 30); do
            curl -sf http://localhost:7880 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/console

      - name: Run e2e specs (stage0..stageN regression)
        run: npx playwright test e2e/stage*.spec.ts
        working-directory: apps/console
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/callplane?schema=callplane"
          REDIS_URL: "redis://localhost:6379"
          LIVEKIT_URL: "ws://localhost:7880"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/console/playwright-report/
          retention-days: 7

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
