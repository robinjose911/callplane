# Local development infrastructure ONLY — no app services here, run those with `turbo dev`.
#
# The `full` profile is the one-command public quickstart:
#   docker compose --profile full up -d
#   docker compose --profile full down
#   docker compose --profile full down -v   # reset all data
#
# The owner's machine already runs Postgres on the default 5432 (shared with another
# local service, isolated by schema `callplane`, not by port) — the `postgres`
# service here is for everyone else, on host port 5433 so it never collides.
#
# Ports and container names are env-var-driven (with these exact defaults) so
# scripts/fresh-clone-smoke.sh can run a second, independent stack on alternate ports/names
# without colliding with an already-running normal dev stack on the same machine.

services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_REDIS_CONTAINER_NAME:-callplane-redis}
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "${COMPOSE_REDIS_PORT:-6379}:6379"
    volumes:
      - callplane_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: ${COMPOSE_LIVEKIT_CONTAINER_NAME:-callplane-livekit}
    restart: unless-stopped
    profiles: ["full"]
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "${COMPOSE_LIVEKIT_PORT:-7880}:7880"
      - "${COMPOSE_LIVEKIT_RTC_PORT:-7881}:7881"
      - "${COMPOSE_LIVEKIT_UDP_RANGE:-50000-50100}:50000-50100/udp"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: ${COMPOSE_POSTGRES_CONTAINER_NAME:-callplane-postgres}
    restart: unless-stopped
    profiles: ["full"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: callplane
    ports:
      - "${COMPOSE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - callplane_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  callplane_redis_data:
  callplane_postgres_data:
